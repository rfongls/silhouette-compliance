name: Deploy to Hostinger

on:
  workflow_dispatch:

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
      SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
      SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
      SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
      ARCHIVE_NAME: compliance-deploy.tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Pack deploy artifact
        run: |
          tar \
            --exclude='.next/cache' \
            --exclude='node_modules' \
            --exclude='tmp' \
            --exclude='.git' \
            -czf "$ARCHIVE_NAME" \
            .env.example \
            .htaccess \
            app \
            auth.ts \
            components \
            instrumentation.ts \
            lib \
            next.config.js \
            package.json \
            package-lock.json \
            prisma \
            scripts \
            server.js \
            tsconfig.json \
            types.d.ts \
            uploads/silhouette-proposal-template.html \
            .next

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}" > ~/.ssh/hostinger_deploy_key
          chmod 600 ~/.ssh/hostinger_deploy_key
          {
            echo "[82.112.248.74]:65002 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGoS6GX5xC1+1FcbLiTqzf4IaBr+7QLPDAGi7JoPYRLG"
            echo "[82.112.248.74]:65002 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBGGEVjMoRmxDq+/BttPSglzYLWsgVh95ne2JSplp/xa3G5UySsfb4CxZP7Tmjb0YlFEJnYqxnaOKyuCyNuwM9sk="
          } >> ~/.ssh/known_hosts

      - name: Upload deploy artifact
        run: |
          printf 'cd %s\nput "%s" "%s"\nbye\n' "$DEPLOY_PATH" "$ARCHIVE_NAME" "$ARCHIVE_NAME" > sftp.batch
          for attempt in 1 2 3 4 5; do
            echo "SFTP archive upload attempt ${attempt}/5"
            if sftp \
              -b sftp.batch \
              -oBatchMode=yes \
              -oConnectTimeout=30 \
              -oServerAliveInterval=15 \
              -oServerAliveCountMax=4 \
              -i ~/.ssh/hostinger_deploy_key \
              -P "$SSH_PORT" \
              "$SSH_USER@$SSH_HOST"; then
              exit 0
            fi
            sleep $((attempt * 20))
          done
          exit 1

      - name: Extract and restart app
        run: |
          ssh \
            -oBatchMode=yes \
            -oConnectTimeout=30 \
            -oServerAliveInterval=15 \
            -oServerAliveCountMax=4 \
            -i ~/.ssh/hostinger_deploy_key \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "set -e
             cd '$DEPLOY_PATH'
             case \"\$PWD\" in
               */domains/complianceapp.silhouettellc.com/public_html) ;;
               *) echo \"Refusing to deploy into unexpected path: \$PWD\" >&2; exit 1 ;;
             esac
             rm -rf .next app components lib prisma scripts
             tar -xzf '$ARCHIVE_NAME'
             rm -f '$ARCHIVE_NAME'
             mkdir -p tmp
             printf 'restart=%s\ncommit=${GITHUB_SHA}\n' \"\$(date -u +%FT%TZ)\" > tmp/restart.txt"

      - name: Smoke test
        run: |
          sleep 12
          curl --fail --location --max-redirs 4 https://complianceapp.silhouettellc.com/
