name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
      SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
      SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
      SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package build artifacts
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next/cache' \
            --exclude='.env' \
            --exclude='HOSTINGER_SILHOUETTE_RUNBOOK.md' \
            -czf release.tgz \
            .env.example \
            .htaccess \
            app \
            auth.ts \
            components \
            instrumentation.ts \
            lib \
            next.config.js \
            package.json \
            package-lock.json \
            prisma \
            scripts \
            server.js \
            tsconfig.json \
            types.d.ts \
            uploads/silhouette-proposal-template.html \
            .next

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}" > ~/.ssh/hostinger_deploy_key
          chmod 600 ~/.ssh/hostinger_deploy_key
          {
            echo "[82.112.248.74]:65002 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGoS6GX5xC1+1FcbLiTqzf4IaBr+7QLPDAGi7JoPYRLG"
            echo "[82.112.248.74]:65002 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBGGEVjMoRmxDq+/BttPSglzYLWsgVh95ne2JSplp/xa3G5UySsfb4CxZP7Tmjb0YlFEJnYqxnaOKyuCyNuwM9sk="
          } >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          scp -i ~/.ssh/hostinger_deploy_key -P "$SSH_PORT" release.tgz "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/release.tgz"

      - name: Activate release
        run: |
          ssh -i ~/.ssh/hostinger_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "set -e
             cd '$DEPLOY_PATH'
             tar -xzf release.tgz
             export PATH=/opt/alt/alt-nodejs22/root/usr/bin:/usr/local/bin:/usr/bin:/bin
             npm ci
             npx prisma migrate deploy
             npx prisma generate
             mkdir -p tmp
             touch tmp/restart.txt"

      - name: Smoke test
        run: |
          curl --fail --location --max-redirs 4 https://complianceapp.silhouettellc.com/app
