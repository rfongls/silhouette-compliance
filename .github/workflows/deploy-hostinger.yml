name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
      SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
      SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
      SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Prepare SFTP upload manifest
        run: |
          printf 'restart %s\n' "$(date -u +%FT%TZ)" > restart.txt
          {
            echo "cd $DEPLOY_PATH"
            echo "-mkdir tmp"
            find app components lib prisma scripts .next -type d \
              ! -path ".next/cache" \
              ! -path ".next/cache/*" \
              | sort \
              | sed 's#.*#-mkdir "&"#'
            for file in \
              .env.example \
              .htaccess \
              auth.ts \
              instrumentation.ts \
              next.config.js \
              package.json \
              package-lock.json \
              server.js \
              tsconfig.json \
              types.d.ts \
              uploads/silhouette-proposal-template.html
            do
              printf 'put "%s" "%s"\n' "$file" "$file"
            done
            find app components lib prisma scripts .next -type f \
              ! -path ".next/cache/*" \
              | sort \
              | sed 's#.*#put "&" "&"#'
            echo 'put "restart.txt" "tmp/restart.txt"'
            echo "bye"
          } > sftp.batch

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}" > ~/.ssh/hostinger_deploy_key
          chmod 600 ~/.ssh/hostinger_deploy_key
          {
            echo "[82.112.248.74]:65002 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGoS6GX5xC1+1FcbLiTqzf4IaBr+7QLPDAGi7JoPYRLG"
            echo "[82.112.248.74]:65002 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBGGEVjMoRmxDq+/BttPSglzYLWsgVh95ne2JSplp/xa3G5UySsfb4CxZP7Tmjb0YlFEJnYqxnaOKyuCyNuwM9sk="
          } >> ~/.ssh/known_hosts

      - name: Upload build over SFTP
        run: |
          for attempt in 1 2 3 4 5; do
            echo "SFTP upload attempt ${attempt}/5"
            if sftp \
              -b sftp.batch \
              -oBatchMode=yes \
              -oConnectTimeout=30 \
              -oServerAliveInterval=15 \
              -oServerAliveCountMax=4 \
              -i ~/.ssh/hostinger_deploy_key \
              -P "$SSH_PORT" \
              "$SSH_USER@$SSH_HOST"; then
              exit 0
            fi
            sleep $((attempt * 20))
          done
          exit 1

      - name: Smoke test
        run: |
          sleep 10
          curl --fail --location --max-redirs 4 https://complianceapp.silhouettellc.com/app
